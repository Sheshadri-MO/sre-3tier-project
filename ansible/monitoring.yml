- hosts: all
  become: yes

  tasks:

    - name: Install Node Exporter
      apt:
        name: prometheus-node-exporter
        state: present
        update_cache: yes

    - name: Start Node Exporter
      service:
        name: prometheus-node-exporter
        state: started
        enabled: yes


- hosts: loadbalancer
  become: yes

  tasks:

    - name: Install Prometheus
      apt:
        name: prometheus
        state: present
        update_cache: yes

    - name: Start Prometheus
      service:
        name: prometheus
        state: started
        enabled: yes

    - name: Install Grafana dependencies
      apt:
        name:
          - apt-transport-https
          - software-properties-common
        state: present

    - name: Add Grafana GPG key
      shell: wget -q -O - https://packages.grafana.com/gpg.key | apt-key add -

    - name: Add Grafana repository
      shell: echo "deb https://packages.grafana.com/oss/deb stable main" > /etc/apt/sources.list.d/grafana.list

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Grafana
      apt:
        name: grafana
        state: present

    - name: Start Grafana
      service:
        name: grafana-server
        state: started
        enabled: yes
